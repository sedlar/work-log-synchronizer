# Example project/task mapping configuration for clockify-export
#
# Maps Clockify project/task pairs to BambooHR project/task IDs.
# Location: ~/.config/clockify-export/mapping.yaml

mappings:
  # Map Clockify "Development" / "Backend" to BambooHR project 1, task 101
  - clockify_project: "Development"
    clockify_task: "Backend"
    bamboo_project_id: 1
    bamboo_task_id: 101

  # Map Clockify "Development" / "Frontend" to BambooHR project 1, task 102
  - clockify_project: "Development"
    clockify_task: "Frontend"
    bamboo_project_id: 1
    bamboo_task_id: 102

  # Map Clockify "Support" / "Bug Fixes" to BambooHR project 2, task 201
  - clockify_project: "Support"
    clockify_task: "Bug Fixes"
    bamboo_project_id: 2
    bamboo_task_id: 201

  # Map all tasks under "Research" to BambooHR project 4 (no specific task)
  - clockify_project: "Research"
    clockify_task: null
    bamboo_project_id: 4
    bamboo_task_id: null
